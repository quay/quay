<html class="{% if onprem %}onprem{% else %}hosted{% endif %}">
  <title>Quay</title>
  <head>
    {% for style_url in external_styles %}
      <link rel="stylesheet" href="{{ style_url }}" type="text/css">
    {% endfor %}
  </head>
  <body>
    <div class="container" style="margin-top: 20px">
      <img src="{{ config_set['BRANDING']['logo'] }}">
      <h5>{{ message | safe }}</h5>
    </div>
  </body>
</html>
