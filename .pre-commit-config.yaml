repos:
-   repo: https://github.com/gitleaks/gitleaks
    rev: v8.16.4
    hooks:
    -   id: gitleaks
-   repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
    -   id: black
-   repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
    -   id: isort
        args: ["--settings-path", "pyproject.toml"]
-   repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
    -   id: flake8
-   repo: local
    hooks:
    -   id: requirements-pinned
        name: Check requirements.txt is pinned
        entry: bash -euo pipefail -c 'while IFS= read -r i; do case "$i" in ""|\\#*|-r*|--*) continue;; esac; if [[ "$i" != *"=="* && "$i" != *"@"* ]]; then echo "$i is not pinned"; exit 1; fi; done < requirements.txt'
        language: system
        files: requirements.txt
        pass_filenames: false
    -   id: config-files-check
        name: Checking Config file changes
        entry: .github/hooks/pre-commit.sh
        language: script
    -   id: requirements-build-sync
        name: Check requirements-build.txt is updated
        entry: .github/hooks/check-requirements-build.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
    -   id: npm-lockfile-sync
        name: Sync npm lockfile with pnpm changes
        entry: bash -c 'if git diff --cached --name-only | grep -qE "^web/(pnpm-lock\.yaml|package\.json)$"; then cd web && npm install --package-lock-only --legacy-peer-deps --silent 2>/dev/null && git add package-lock.json; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]
    -   id: eslint
        name: ESLint
        entry: web/node_modules/.bin/eslint --fix
        language: system
        files: ^web/
        exclude: ^web/Containerfile|^web/Dockerfile|^web/pnpm-lock\.yaml|^web/package-lock\.json
-   repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
    -   id: shellcheck
        args: ["--severity=warning"]
        files: ^(\.claude/scripts|\.github/hooks)/.*\.sh$
-   repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-1
    hooks:
    -   id: shfmt
        args: ["-i", "2", "-ci", "-bn"]
        files: ^(\.claude/scripts|\.github/hooks)/.*\.sh$
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
