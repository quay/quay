coverage:
  status:
    project:
      default:
        target: 70%
      backend:
        flags:
          - unit
        paths:
          - "!web/**"
        target: 70%
      web:
        flags:
          - web
        paths:
          - "web/src/**"
        target: auto
        threshold: 1%
    patch:
      default:
        target: 60%

flags:
  unit:
    paths:
      - "!web/**"
    carryforward: true
  web:
    paths:
      - "web/src/**"
    carryforward: true

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
  individual_components:
    - component_id: backend
      name: Backend (Python)
      paths:
        - "**/*.py"
        - "!web/**"
    - component_id: web
      name: Web (React/TypeScript)
      paths:
        - "web/src/**"
