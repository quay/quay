name: Storybook Preview Deploy
on:
  workflow_run:
    workflows: ["Storybook CI"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy Storybook Preview to Surge
    runs-on: ubuntu-22.04
    if: github.event.workflow_run.event == 'pull_request'

    permissions:
      pull-requests: write
      contents: read

    steps:
    - name: Download Storybook build artifact
      uses: dawidd6/action-download-artifact@20319c5641d495c8a52e688b7dc5fada6c3a9fbc # v8
      with:
        name: storybook-static
        workflow: web-storybook-ci.yaml
        run_id: ${{ github.event.workflow_run.id }}
        path: ./storybook-static

    - name: Download PR number
      uses: dawidd6/action-download-artifact@20319c5641d495c8a52e688b7dc5fada6c3a9fbc # v8
      with:
        name: storybook-pr-info
        workflow: web-storybook-ci.yaml
        run_id: ${{ github.event.workflow_run.id }}
        path: ./pr-info

    - name: Read PR number
      id: pr
      run: |
        PR_NUMBER=$(cat pr-info/pr_number.txt)
        echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

    - name: Deploy to Surge
      id: deploy
      run: |
        DEPLOY_DOMAIN="quay-storybook-pr-${{ steps.pr.outputs.number }}.surge.sh"
        cd storybook-static
        npx surge . $DEPLOY_DOMAIN --token ${{ secrets.SURGE_TOKEN }}
        echo "url=https://$DEPLOY_DOMAIN" >> $GITHUB_OUTPUT
      env:
        SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

    - name: Comment PR with Storybook URL
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        script: |
          const reportUrl = '${{ steps.deploy.outputs.url }}';
          const prNumber = ${{ steps.pr.outputs.number }};
          const conclusion = '${{ github.event.workflow_run.conclusion }}';
          const runUrl = '${{ github.event.workflow_run.html_url }}';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
          });

          const botComment = comments.find(comment =>
            comment.user.type === 'Bot' &&
            comment.body.includes('Storybook Preview')
          );

          const statusEmoji = conclusion === 'success' ? '✅' : '❌';
          const statusText = conclusion === 'success' ? 'passed' : 'failed';

          const commentBody = `## Storybook Preview

          ${statusEmoji} **Build ${statusText}**

          📖 **[Open Storybook](${reportUrl})**

          🔗 [View Workflow Run](${runUrl})

          _Preview from commit ${{ github.event.workflow_run.head_sha }}_`;

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: commentBody
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });
          }
