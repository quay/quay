name: Config Tool
on:
  push:
    branches:
    - "!dependabot/*"
    - "*"
    paths:
    - config-tool/**
  pull_request:
    branches:
    - "*"
    paths:
    - config-tool/**
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Setup Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4.3.0
        with:
          go-version-file: config-tool/go.mod
          cache-dependency-path: config-tool/go.sum

      - name: Verify go.mod
        run: cd ./config-tool && go mod tidy && git diff --exit-code

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Set up Go 1.x
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4.3.0
        with:
          go-version-file: config-tool/go.mod
          cache-dependency-path: config-tool/go.sum

      - name: Build
        run: cd ./config-tool && go build -v ./...

  tests:
    name: Tests
    runs-on: ubuntu-latest
    container: docker.io/library/golang:1.24.8
    services:
      postgres:
        image: postgres:11.5
        env:
          POSTGRES_USER: "user"
          POSTGRES_PASSWORD: "password"
          POSTGRES_DB: "quay"
      redis:
        image: redis:latest
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: quay
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
      - name: Workaround for dubious ownership issue
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Build
        run: cd ./config-tool && go build -v ./...
      - name: Tests
        run: cd ./config-tool && go test ./pkg/lib/fieldgroups/...
        env:
          GODEBUG: x509ignoreCN=0
