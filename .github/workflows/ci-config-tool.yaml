name: Config Tool

on:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: config-tool/go.mod
          cache-dependency-path: config-tool/go.sum

      - name: Verify go.mod
        run: cd ./config-tool && go mod tidy && git diff --exit-code

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go 1.x
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: config-tool/go.mod
          cache-dependency-path: config-tool/go.sum

      - name: Build
        run: cd ./config-tool && go build -v ./...

  tests:
    name: Tests
    runs-on: ubuntu-latest
    container: docker.io/library/golang:1.25.0
    services:
      postgres:
        image: postgres:11.5
        env:
          POSTGRES_USER: "user"
          POSTGRES_PASSWORD: "password"
          POSTGRES_DB: "quay"
      redis:
        image: redis:7.4
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: quay
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Workaround for dubious ownership issue
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Build
        run: cd ./config-tool && go build -v ./...
      - name: Tests
        run: cd ./config-tool && go test ./pkg/lib/fieldgroups/...
        env:
          GODEBUG: x509ignoreCN=0
