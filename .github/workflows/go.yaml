name: Go

on:
  push:
    branches: [master]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.github/workflows/go.yaml'
      - 'util/config/schema.py'
      - 'data/database.py'
      - 'data/fields.py'
      - 'data/model/sqlalchemybridge.py'
      - 'initdb.py'
      - 'internal/dal/schema/**'
      - 'tools/export_schema_ddl.py'
      - '!config-tool/**'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.github/workflows/go.yaml'
      - 'util/config/schema.py'
      - 'data/database.py'
      - 'data/fields.py'
      - 'data/model/sqlalchemybridge.py'
      - 'initdb.py'
      - 'internal/dal/schema/**'
      - 'tools/export_schema_ddl.py'
      - '!config-tool/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make go-build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make go-test

  schema-sync:
    name: Schema Drift Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install peewee sqlalchemy bcrypt resumablesha256 cachetools

      - name: Check schema drift
        run: make go-schema-check
