name: Go

on:
  push:
    branches: [master]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.github/workflows/go.yaml'
      - 'util/config/schema.py'
      - 'data/database.py'
      - 'data/fields.py'
      - 'data/migrations/versions/**'
      - 'internal/dal/**'
      - 'sqlc.yaml'
      - 'Makefile'
      - 'tools/schema_fingerprint.py'
      - 'requirements.txt'
      - '!config-tool/**'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.github/workflows/go.yaml'
      - 'util/config/schema.py'
      - 'data/database.py'
      - 'data/fields.py'
      - 'data/migrations/versions/**'
      - 'internal/dal/**'
      - 'sqlc.yaml'
      - 'Makefile'
      - 'tools/schema_fingerprint.py'
      - 'requirements.txt'
      - '!config-tool/**'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make go-build

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quay-binary
          path: bin/quay
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make go-test

  schema-sync:
    name: Schema Drift Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgpgme-dev libldap2-dev libsasl2-dev swig

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0

      - name: Check schema drift
        run: make go-schema-check

  e2e-mirror:
    name: E2E Mirror
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download quay binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: quay-binary
          path: bin/

      - name: Build container image
        run: |
          chmod +x bin/quay
          podman build -f Dockerfile.mirror -t quay-mirror:test .

      - name: Save image archive
        run: podman save quay-mirror:test -o /tmp/quay-mirror.tar

      - name: Install registry
        run: |
          sudo bin/quay install \
            -hostname=localhost \
            -data-dir=/var/lib/quay \
            -image-archive=/tmp/quay-mirror.tar

      - name: Trust registry TLS certificate
        run: |
          sudo install -m 644 /var/lib/quay/ssl.cert /usr/local/share/ca-certificates/quay.crt
          sudo update-ca-certificates

          sudo mkdir -p /etc/containers/certs.d/localhost:8443
          sudo install -m 644 /var/lib/quay/ssl.cert /etc/containers/certs.d/localhost:8443/ca.crt

      - name: Set up auth
        run: |
          PASSWORD=$(sudo cat /var/lib/quay/auth/admin-password)
          mkdir -p ~/.docker
          echo '{"auths":{"localhost:8443":{"auth":"'$(echo -n "admin:$PASSWORD" | base64)'"}}}' \
            > ~/.docker/config.json

      - name: Install oc-mirror
        run: |
          curl -fsSL -o /tmp/oc-mirror.tar.gz \
            https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/latest/oc-mirror.tar.gz
          sudo tar xzf /tmp/oc-mirror.tar.gz -C /usr/local/bin oc-mirror
          sudo chmod 755 /usr/local/bin/oc-mirror
          oc-mirror version

      - name: Write ImageSetConfiguration
        run: |
          cat > /tmp/imageset.yaml <<'EOF'
          apiVersion: mirror.openshift.io/v2alpha1
          kind: ImageSetConfiguration
          mirror:
            additionalImages:
            - name: quay.io/projectquay/quay:3.13.2
            - name: quay.io/projectquay/quay-builder:3.13.0
            - name: quay.io/projectquay/clair:4.7.4
            - name: quay.io/quay/quay-operator:latest
            - name: quay.io/prometheus/prometheus:latest
            - name: quay.io/prometheus/alertmanager:latest
            - name: quay.io/prometheus/node-exporter:latest
            - name: quay.io/prometheus/pushgateway:latest
            - name: quay.io/coreos/etcd:v3.5.0
          EOF

      - name: Mirror to disk
        run: |
          oc-mirror --v2 \
            --parallel-images 4 \
            --parallel-layers 4 \
            -c /tmp/imageset.yaml \
            file:///tmp/mirror-workspace

      - name: Mirror to registry
        run: |
          oc-mirror --v2 \
            --parallel-images 4 \
            --parallel-layers 4 \
            -c /tmp/imageset.yaml \
            --from file:///tmp/mirror-workspace \
            docker://localhost:8443

      - name: Verify healthz
        run: curl -fs https://localhost:8443/healthz

      - name: Verify mirrored repositories
        run: |
          PASSWORD=$(sudo cat /var/lib/quay/auth/admin-password)
          curl -fs -u "admin:$PASSWORD" \
            https://localhost:8443/v2/_catalog | tee /tmp/catalog.json

          COUNT=$(jq '.repositories | length' /tmp/catalog.json)
          echo "Found $COUNT repositories:"
          jq -r '.repositories[]' /tmp/catalog.json

          if [ "$COUNT" -lt 9 ]; then
            echo "FAIL: expected at least 9 repositories, got $COUNT"
            exit 1
          fi
          echo "All repositories verified"

      - name: Pull mirrored image
        run: |
          PASSWORD=$(sudo cat /var/lib/quay/auth/admin-password)
          REPO=$(curl -fs -u "admin:$PASSWORD" \
            https://localhost:8443/v2/_catalog | jq -r '.repositories[0]')
          TAG=$(curl -fs -u "admin:$PASSWORD" \
            "https://localhost:8443/v2/$REPO/tags/list" | jq -r '.tags[0]')
          echo "Pulling localhost:8443/$REPO:$TAG"
          podman pull "localhost:8443/$REPO:$TAG"
          echo "Successfully pulled mirrored image"

      - name: Collect diagnostics
        if: always()
        run: |
          mkdir -p /tmp/e2e-diagnostics
          sudo podman logs systemd-quay > /tmp/e2e-diagnostics/container.log 2>&1 || true
          sudo journalctl -u quay.service --no-pager > /tmp/e2e-diagnostics/systemd.log 2>&1 || true
          sudo systemctl status quay.service > /tmp/e2e-diagnostics/service-status.txt 2>&1 || true
          sudo ls -la /var/lib/quay/ > /tmp/e2e-diagnostics/data-dir.txt 2>&1 || true
          sudo cat /etc/containers/systemd/quay.container > /tmp/e2e-diagnostics/quadlet.txt 2>&1 || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-mirror-diagnostics
          path: /tmp/e2e-diagnostics/
          retention-days: 7
