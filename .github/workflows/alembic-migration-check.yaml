name: Alembic Migration Check
on:
  pull_request:
    branches:
    - "*"
    paths:
    - "data/migrations/versions/**"

permissions:
  contents: read

jobs:
  validate-migrations:
    name: Validate Alembic Migrations
    runs-on: ubuntu-22.04
    steps:

    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
        fetch-depth: 0  # need full history for diff

    - name: Check for suspicious migration revision IDs
      run: |
        # Get newly added migration files in this PR
        NEW_FILES=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD -- 'data/migrations/versions/*.py' || true)

        if [ -z "$NEW_FILES" ]; then
          echo "No new migration files found — nothing to check."
          exit 0
        fi

        echo "New migration files detected:"
        echo "$NEW_FILES"
        echo ""

        FAILED=0
        for file in $NEW_FILES; do
          # Extract revision ID from filename (first segment before underscore)
          basename=$(basename "$file" .py)
          rev_id=$(echo "$basename" | cut -d'_' -f1)

          echo "Checking revision ID: $rev_id (from $file)"

          # Check 1: Revision ID should be exactly 12 hex characters
          if ! echo "$rev_id" | grep -qE '^[0-9a-f]{12}$'; then
            echo "  FAIL: Revision ID '$rev_id' is not a valid 12-character hex string."
            FAILED=1
            continue
          fi

          # Check 2: Detect sequential hex patterns like a1b2c3d4e5f6
          # Split into pairs and check if they form an obvious sequence
          pairs=$(echo "$rev_id" | sed 's/\(..\)/\1 /g')
          is_sequential=true
          prev=""
          for pair in $pairs; do
            if [ -n "$prev" ]; then
              prev_val=$((16#$prev))
              curr_val=$((16#$pair))
              diff=$(( curr_val - prev_val ))
              # If all consecutive pairs differ by the same amount, it's suspicious
              if [ -z "$first_diff" ]; then
                first_diff=$diff
              elif [ "$diff" -ne "$first_diff" ]; then
                is_sequential=false
              fi
            fi
            prev=$pair
          done

          if [ "$is_sequential" = true ] && [ -n "$first_diff" ]; then
            echo "  WARNING: Revision ID '$rev_id' has a suspiciously sequential pattern."
            echo "  This looks like it may have been hand-crafted rather than generated by Alembic."
            echo "  Please regenerate using: alembic revision -m \"description\""
            FAILED=1
          fi

          # Reset for next file
          unset first_diff

          # Check 3: Verify revision ID appears inside the file as well
          if ! grep -q "^revision = ['\"]${rev_id}['\"]" "$file"; then
            echo "  FAIL: Revision ID '$rev_id' in filename does not match the revision variable inside the file."
            FAILED=1
          else
            echo "  OK"
          fi
        done

        if [ "$FAILED" -ne 0 ]; then
          echo ""
          echo "========================================="
          echo "Migration validation failed."
          echo ""
          echo "Migration files must be scaffolded with:"
          echo "  alembic revision -m \"description\""
          echo ""
          echo "Do NOT hand-write migration files or"
          echo "fabricate revision IDs."
          echo "========================================="
          exit 1
        fi

        echo ""
        echo "All migration files passed validation."

    - name: Validate migration chain integrity
      run: |
        # Verify no duplicate revision IDs exist
        REVISIONS=$(ls data/migrations/versions/*.py 2>/dev/null | xargs -I{} basename {} .py | cut -d'_' -f1 | sort)
        DUPLICATES=$(echo "$REVISIONS" | uniq -d)

        if [ -n "$DUPLICATES" ]; then
          echo "FAIL: Duplicate migration revision IDs detected:"
          echo "$DUPLICATES"
          exit 1
        fi

        echo "No duplicate revision IDs found."

        # Verify each migration file has a valid revision and down_revision
        FAILED=0
        for file in data/migrations/versions/*.py; do
          basename_file=$(basename "$file" .py)
          rev_id=$(echo "$basename_file" | cut -d'_' -f1)

          if ! grep -q "^revision = " "$file"; then
            echo "FAIL: $file is missing 'revision' variable."
            FAILED=1
          fi

          if ! grep -q "^down_revision = " "$file"; then
            echo "FAIL: $file is missing 'down_revision' variable."
            FAILED=1
          fi
        done

        if [ "$FAILED" -ne 0 ]; then
          exit 1
        fi

        echo "All migration files have valid revision and down_revision declarations."
