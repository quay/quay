name: CI

on:
  push:
    branches:
      - "*"
      - "!dependabot/**"
  pull_request:
    branches:
      - "*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      python: ${{ steps.filter.outputs.python }}
      web: ${{ steps.filter.outputs.web }}
      oci: ${{ steps.filter.outputs.oci }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.github/workflows/ci-go.yaml'
              - 'internal/dal/**'
              - 'sqlc.yaml'
              - 'tools/schema_fingerprint.py'
              - 'data/database.py'
              - 'data/fields.py'
              - 'data/migrations/versions/**'
              - 'Makefile'
              - 'requirements.txt'
              - '!config-tool/**'
            python:
              - '**/*.py'
              - 'requirements*.txt'
              - 'constraints.txt'
              - 'tox.ini'
              - 'setup.py'
              - 'setup.cfg'
              - 'pyproject.toml'
              - '.flake8'
              - '.pre-commit-config.yaml'
              - 'mypy.ini'
              - 'mypy_stubs/**'
              - 'alembic.ini'
              - 'Makefile'
              - 'data/migrations/versions/**'
              - '.github/workflows/ci-python.yaml'
              - 'local-dev/**'
              - 'docker-compose.yaml'
              - 'docker-compose.static'
              - '.github/actions/**'
              - '.github/scripts/**'
              - '.github/workflows/sentinel.yaml'
              - '!config-tool/**'
              - '!web/**'
            web:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!agent_docs/**'
              - '!deploy/**'
              - '!.chglog/**'
              - '!LICENSE'
              - '!OWNERS'
            oci:
              - '**/*.py'
              - '**/*.go'
              - 'Dockerfile'
              - 'go.mod'
              - 'go.sum'
              - 'requirements*.txt'
              - 'Makefile'
              - '.github/workflows/ci-oci-spec.yaml'
              - 'local-dev/**'
              - 'docker-compose.yaml'
              - 'docker-compose.static'
              - '.github/actions/**'
              - '.github/scripts/**'
              - '.github/workflows/sentinel.yaml'
              - '!config-tool/**'
              - '!web/**'
              - '!docs/**'
              - '!agent_docs/**'
              - '!deploy/**'
              - '!.chglog/**'

  pr-lint:
    name: conventional commit check
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: check conventional commit
        uses: agenthunt/conventional-commit-checker-action@9e552d650d0e205553ec7792d447929fc78e012b # v2.0.0
        with:
          pr-title-regex: '^(?:\[redhat-[0-9]+\.[0-9]+\] )?(?:PROJQUAY-[0-9]+|QUAYIO-[0-9]+|NO-ISSUE): [a-z]+(?:\([^)]+\))?: .+$'
          pr-body-regex: '(.*)?'

  python-ci:
    name: Python
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.python == 'true' }}
    uses: ./.github/workflows/ci-python.yaml
    with:
      is-pr: ${{ github.event_name == 'pull_request' }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  go-ci:
    name: Go
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.go == 'true' }}
    uses: ./.github/workflows/ci-go.yaml

  web-ci:
    name: Web
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.web == 'true' }}
    uses: ./.github/workflows/ci-web.yaml
    with:
      is-pr: ${{ github.event_name == 'pull_request' }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  oci-spec:
    name: OCI
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.oci == 'true' }}
    uses: ./.github/workflows/ci-oci-spec.yaml

  all-green:
    name: all-green
    needs: [detect-changes, pr-lint, python-ci, go-ci, web-ci, oci-spec]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: >-
            ${{
              github.event_name != 'pull_request' && 'pr-lint,' || ''
            }}${{
              needs.go-ci.result == 'skipped' && 'go-ci,' || ''
            }}${{
              needs.python-ci.result == 'skipped' && 'python-ci,' || ''
            }}${{
              needs.web-ci.result == 'skipped' && 'web-ci,' || ''
            }}${{
              needs.oci-spec.result == 'skipped' && 'oci-spec,' || ''
            }}
          jobs: ${{ toJSON(needs) }}
