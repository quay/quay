name: CI

on:
  push:
    branches:
      - "*"
      - "!dependabot/**"
  pull_request:
    branches:
      - "*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read
  security-events: write
  actions: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      python: ${{ steps.filter.outputs.python }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Detect changed paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.github/workflows/ci-go.yaml'
              - 'internal/dal/**'
              - 'sqlc.yaml'
              - 'tools/schema_fingerprint.py'
              - 'data/database.py'
              - 'data/fields.py'
              - 'data/migrations/versions/**'
              - 'Makefile'
              - 'requirements.txt'
              - '!config-tool/**'
            python:
              - '**/*.py'
              - 'requirements*.txt'
              - 'constraints.txt'
              - 'tox.ini'
              - 'setup.py'
              - 'setup.cfg'
              - 'pyproject.toml'
              - '.flake8'
              - '.pre-commit-config.yaml'
              - 'mypy.ini'
              - 'mypy_stubs/**'
              - 'alembic.ini'
              - 'Makefile'
              - 'data/migrations/versions/**'
              - '.github/workflows/ci-python.yaml'
              - 'local-dev/**'
              - 'docker-compose.yaml'
              - 'docker-compose.static'
              - '.github/actions/**'
              - '.github/scripts/**'
              - '.github/workflows/sentinel.yaml'
              - '!config-tool/**'
              - '!web/**'
            web:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!agent_docs/**'
              - '!deploy/**'
              - '!.chglog/**'
              - '!LICENSE'
              - '!OWNERS'

  lint-ci:
    name: Lint
    uses: ./.github/workflows/ci-lint.yaml
    with:
      is-pr: ${{ github.event_name == 'pull_request' }}

  python-ci:
    name: Python
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.python == 'true' }}
    uses: ./.github/workflows/ci-python.yaml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  go-ci:
    name: Go
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.go == 'true' }}
    uses: ./.github/workflows/ci-go.yaml

  web-ci:
    name: Web
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.web == 'true' }}
    uses: ./.github/workflows/ci-web.yaml
    with:
      is-pr: ${{ github.event_name == 'pull_request' }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  all-green:
    name: all-green
    needs: [detect-changes, lint-ci, python-ci, go-ci, web-ci]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: >-
            ${{
              needs.go-ci.result == 'skipped' && 'go-ci,' || ''
            }}${{
              needs.python-ci.result == 'skipped' && 'python-ci,' || ''
            }}${{
              needs.web-ci.result == 'skipped' && 'web-ci,' || ''
            }}
          jobs: ${{ toJSON(needs) }}
