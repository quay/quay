name: Storybook CI

on:
  pull_request:
    paths:
      - 'web/**'

concurrency:
  group: storybook-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  storybook:
    name: Build & Test Storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd web && pnpm exec playwright install --with-deps chromium

      - name: Build Storybook
        working-directory: web
        run: pnpm run build-storybook

      - name: Run interaction tests
        working-directory: web
        run: |
          pnpm exec concurrently -k -s first -n "SB,TEST" \
            "pnpm exec http-server storybook-static --port 6006 --silent" \
            "pnpm exec wait-on tcp:127.0.0.1:6006 && pnpm run test-storybook -- --url http://127.0.0.1:6006"

      - name: Check story coverage for new components
        working-directory: web
        run: bash ../.github/scripts/check-story-coverage.sh

      - name: Story coverage report
        if: always()
        working-directory: web
        run: bash ../.github/scripts/story-coverage-report.sh

      - name: Upload Storybook build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: web/storybook-static
          retention-days: 7

      - name: Save PR number
        if: github.event_name == 'pull_request'
        run: echo "${{ github.event.pull_request.number }}" > pr_number.txt

      - name: Upload PR info
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: storybook-pr-info
          path: pr_number.txt
