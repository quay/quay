name: Playwright E2E Tests
on:
  pull_request:
    branches:
      - "*"

jobs:
  playwright:
    name: Playwright E2E Tests
    runs-on: quay-003-medium-ubuntu-24-x64
    env:
      QUAY_HOTRELOAD: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Quay
        uses: ./.github/actions/setup-quay
        with:
          with-clair: true
          with-keycloak: true
          with-ldap: true
          with-jaeger: true
          with-repomirror: true
          use-gha-cache: false
          extra-config: |
            FEATURE_MAILING: true
            FEATURE_SECURITY_SCANNER: true
            FEATURE_SECURITY_NOTIFICATIONS: true

      - name: Set up Node.js with npm caching
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm install

      - name: Get Playwright version
        id: playwright-version
        run: |
          cd web
          PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")
          echo "version=$PLAYWRIGHT_VERSION" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd web && npx playwright install --with-deps

      - name: Install Playwright OS dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd web && npx playwright install-deps

      - name: Install skopeo for multi-arch image tests
        run: sudo apt-get update && sudo apt-get install -y skopeo

      - name: Run Database auth tests
        env:
          PLAYWRIGHT_BLOB_OUTPUT_DIR: blob-results/db
        run: cd web && npx playwright test --project=chromium --grep-invert "@auth:OIDC|@auth:LDAP" --reporter=blob

      - name: Run legacy UI toggle and smoke tests
        if: always()
        env:
          PLAYWRIGHT_BLOB_OUTPUT_DIR: blob-results/legacy-ui
        run: cd web && npx playwright test --project=legacy-ui --reporter=blob

      - name: Swap to OIDC authentication
        if: always()
        run: |
          pip install pyyaml -q
          # Merge Keycloak OIDC login config
          python3 .github/actions/setup-quay/merge-yaml.py \
            local-dev/stack/config.yaml \
            local-dev/keycloak/keycloak-config.yaml \
            > local-dev/stack/config.yaml.tmp
          mv local-dev/stack/config.yaml.tmp local-dev/stack/config.yaml
          # Merge OIDC auth type + feature flags (inline, no duplicate file)
          cat > /tmp/oidc-auth-overlay.yaml <<'EOF'
          AUTHENTICATION_TYPE: OIDC
          FEATURE_TEAM_SYNCING: true
          FEATURE_NONSUPERUSER_TEAM_SYNCING_SETUP: true
          SUPER_USERS:
            - admin
            - admin_oidc
          EOF
          python3 .github/actions/setup-quay/merge-yaml.py \
            local-dev/stack/config.yaml \
            /tmp/oidc-auth-overlay.yaml \
            > local-dev/stack/config.yaml.tmp
          mv local-dev/stack/config.yaml.tmp local-dev/stack/config.yaml
          # Restart Quay and wait for healthy
          docker restart quay-quay
          curl -sf --retry 30 --retry-delay 2 --retry-all-errors \
            http://localhost:8080/health/instance > /dev/null
          echo "Quay is ready with OIDC auth"

      - name: Run OIDC auth tests
        if: always()
        env:
          PLAYWRIGHT_BLOB_OUTPUT_DIR: blob-results/oidc
        run: cd web && npx playwright test --project=chromium --grep @auth:OIDC --reporter=blob

      - name: Swap to LDAP authentication
        if: always()
        run: |
          pip install pyyaml -q
          # Merge LDAP config (sets AUTHENTICATION_TYPE: LDAP + connection details)
          python3 .github/actions/setup-quay/merge-yaml.py \
            local-dev/stack/config.yaml \
            local-dev/ldap/ldap-config.yaml \
            > local-dev/stack/config.yaml.tmp
          mv local-dev/stack/config.yaml.tmp local-dev/stack/config.yaml
          # Merge LDAP-specific feature flags
          cat > /tmp/ldap-auth-overlay.yaml <<'EOF'
          FEATURE_TEAM_SYNCING: true
          FEATURE_NONSUPERUSER_TEAM_SYNCING_SETUP: true
          SUPER_USERS:
            - admin
            - admin_ldap
          EOF
          python3 .github/actions/setup-quay/merge-yaml.py \
            local-dev/stack/config.yaml \
            /tmp/ldap-auth-overlay.yaml \
            > local-dev/stack/config.yaml.tmp
          mv local-dev/stack/config.yaml.tmp local-dev/stack/config.yaml
          # Restart Quay and wait for healthy
          docker restart quay-quay
          curl -sf --retry 30 --retry-delay 2 --retry-all-errors \
            http://localhost:8080/health/instance > /dev/null
          echo "Quay is ready with LDAP auth"

      - name: Run LDAP auth tests
        if: always()
        env:
          PLAYWRIGHT_BLOB_OUTPUT_DIR: blob-results/ldap
        run: cd web && npx playwright test --project=chromium --grep @auth:LDAP --reporter=blob

      - name: Merge test reports
        if: always()
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/results.json
        run: |
          cd web
          mkdir -p all-blob-reports
          find blob-results -name '*.zip' -exec cp {} all-blob-reports/ \; 2>/dev/null
          if [ "$(ls -A all-blob-reports 2>/dev/null)" ]; then
            npx playwright merge-reports --reporter=html,json all-blob-reports
          else
            echo "::warning::No blob reports found. Test reports were not generated."
          fi

      - name: Save PR number
        if: always()
        run: |
          mkdir -p ./pr-info
          echo ${{ github.event.pull_request.number }} > ./pr-info/pr_number.txt

      - name: Upload PR info
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-info
          path: pr-info/
          retention-days: 1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: web/test-results/
          retention-days: 30

      - name: Export Jaeger traces
        if: always()
        run: |
          mkdir -p jaeger-traces
          curl -sf "http://localhost:16686/api/traces?service=quay&limit=50000&lookback=2h" \
            -o jaeger-traces/traces.json \
            || echo "::warning::Could not export Jaeger traces"

      - name: Analyze Jaeger traces
        if: always()
        continue-on-error: true
        run: bash .github/scripts/analyze-jaeger-traces.sh
        env:
          TRACES_FILE: jaeger-traces/traces.json
          METRICS_FILE: jaeger-traces/trace-metrics.json
          COMMIT_SHA: ${{ github.sha }}

      - name: Analyze API endpoint coverage
        if: always()
        continue-on-error: true
        run: python3 .github/scripts/analyze-api-coverage.py
        env:
          TRACES_FILE: jaeger-traces/traces.json
          COVERAGE_FILE: jaeger-traces/api-coverage.json
          QUAY_API_URL: http://localhost:8080
          COMMIT_SHA: ${{ github.sha }}

      - name: Upload Jaeger traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jaeger-traces
          path: jaeger-traces/
          retention-days: 7

      - name: Scan Quay logs for crash-level errors
        if: always()
        continue-on-error: true
        run: |
          logs=$(docker logs quay-quay 2>&1)

          # Crash signals from core serving processes only.
          # - stderr tracebacks from gunicorn = process-level crashes (gevent, fork, etc.)
          # - stdout tracebacks from gunicorn are normal Flask error handling, skip those
          # - supervisord FATAL = process exceeded restart limit
          # - Background workers (securityworker, *gcworker, etc.) have expected
          #   transient failures (Clair not ready, queue empty) — exclude them.
          crashes=$(echo "$logs" \
            | grep -E "^(gunicorn-.* stderr|supervisord )" \
            | grep -cE "Traceback|AssertionError|Segmentation fault|SIGABRT|core dumped|FATAL state|failed to boot" \
            || true)

          if [ "$crashes" -gt 0 ]; then
            echo "::warning::Found $crashes crash-level error(s) in Quay core process logs"

            {
              echo "## Quay Runtime Error Report"
              echo ""
              echo "Found **$crashes** crash-level signal(s) in core serving process logs."
              echo ""
              echo '```'
              echo "$logs" \
                | grep -E "^(gunicorn-.* stderr|supervisord )" \
                | grep -B2 -A3 "Traceback\|AssertionError\|Segmentation fault\|SIGABRT\|core dumped\|FATAL state\|failed to boot"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            exit 1
          fi

      - name: Collect Quay logs on failure
        if: failure()
        uses: ./.github/actions/collect-quay-logs
        with:
          artifact-name: 'quay-container-logs'
